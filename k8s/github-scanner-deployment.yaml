apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-scanner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: github-scanner
  template:
    metadata:
      labels:
        app: github-scanner
    spec:
      containers:
      - name: github-scanner
        image: yogitaaher/github-scanner
        ports:
        - containerPort: 8002
        env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GITHUB_TOKEN