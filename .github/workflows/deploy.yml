name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build & Push Images
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway ./api_gateway
        docker build -t ${{ secrets.DOCKER_USERNAME }}/breach-scanner ./breach_scanner
        docker build -t ${{ secrets.DOCKER_USERNAME }}/github-scanner ./github_scanner
        docker build -t ${{ secrets.DOCKER_USERNAME }}/risk-analyzer ./risk_analyzer

        docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway
        docker push ${{ secrets.DOCKER_USERNAME }}/breach-scanner
        docker push ${{ secrets.DOCKER_USERNAME }}/github-scanner
        docker push ${{ secrets.DOCKER_USERNAME }}/risk-analyzer